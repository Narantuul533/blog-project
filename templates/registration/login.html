{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        
        <h2>Нэвтрэх</h2>
        <p class="auth-subtitle">Та өөрийн бүртгэлээр нэвтэрнэ үү</p>
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Хэрэглэгчийн нэр:</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label for="id_password">Нууц үг:</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn-primary">Нэвтрэх</button>
        </form>
        
        <div class="auth-footer">
            <span>Бүртгэлгүй юу?</span>
            <a href="{% url 'signup' %}">Энд дарж бүртгүүлнэ үү.</a>
        </div>
    </div>
</div>
{% endblock %}
